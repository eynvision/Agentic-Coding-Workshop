services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - taskflow-data:/data
    environment:
      - DB_PATH=/data/tasks.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  taskflow-data: